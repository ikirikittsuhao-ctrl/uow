<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新規登録 | sasuty</title>
    <style>
        :root {
            --primary-blue: #1d9bf0;
            --primary-blue-hover: #1a8cd8;
            --text-main: #0f1419;
            --text-sub: #536471;
            --border-light: #eff3f4;
            --error-color: #f4212e;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #fff;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-card {
            width: 100%;
            max-width: 380px;
        }
        .logo {
            font-size: 34px;
            font-weight: 900;
            text-align: center;
            margin-bottom: 8px;
            letter-spacing: -1.5px;
        }
        .subtitle {
            text-align: center;
            color: var(--text-sub);
            font-size: 15px;
            margin-bottom: 32px;
        }
        .input-field {
            display: flex;
            flex-direction: column;
            border: 1px solid #cfd9de;
            border-radius: 4px;
            padding: 10px 12px;
            margin-bottom: 16px;
            transition: border-color 0.2s;
        }
        .input-field:focus-within {
            border-color: var(--primary-blue);
        }
        .input-field label {
            font-size: 12px;
            color: var(--text-sub);
            font-weight: 500;
        }
        .input-field input {
            border: none;
            outline: none;
            background: none;
            font-size: 16px;
            font-family: inherit;
            color: var(--text-main);
            margin-top: 4px;
        }
        .field-hint {
            font-size: 12px;
            color: var(--text-sub);
            margin-top: -10px;
            margin-bottom: 16px;
            padding: 0 4px;
        }
        .btn-primary {
            width: 100%;
            background: var(--primary-blue);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 9999px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }
        .btn-primary:hover { background: var(--primary-blue-hover); }
        .btn-primary:disabled { background: #8ecdf8; cursor: not-allowed; }
        .error-msg {
            color: var(--error-color);
            font-size: 14px;
            margin-bottom: 16px;
            display: none;
            padding: 10px 12px;
            background: rgba(244, 33, 46, 0.08);
            border-radius: 8px;
        }
        .switch-link {
            text-align: center;
            margin-top: 24px;
            font-size: 15px;
            color: var(--text-sub);
        }
        .switch-link a {
            color: var(--primary-blue);
            text-decoration: none;
            font-weight: 700;
        }
        .switch-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="logo">sasuty</div>
        <div class="subtitle">アカウントを作成</div>

        <div id="error-msg" class="error-msg"></div>

        <form id="register-form">
            <div class="input-field">
                <label>表示名</label>
                <input type="text" id="display_name" placeholder="例）山田太郎" maxlength="30">
            </div>

            <div class="input-field">
                <label>ユーザー名</label>
                <input type="text" id="handle" placeholder="@なしで入力" autocomplete="username" required maxlength="15">
            </div>
            <div class="field-hint">半角英数字とアンダースコアのみ、3〜15文字</div>

            <div class="input-field">
                <label>パスワード</label>
                <input type="password" id="password" placeholder="6文字以上" autocomplete="new-password" required minlength="6">
            </div>

            <button type="submit" class="btn-primary" id="submit-btn">登録する</button>
        </form>

        <div class="switch-link">
            既にアカウントをお持ちですか？ <a href="/login.html">ログイン</a>
        </div>
    </div>

    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const display_name = document.getElementById('display_name').value.trim();
            const handle = document.getElementById('handle').value.trim();
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');
            const submitBtn = document.getElementById('submit-btn');

            errorMsg.style.display = 'none';
            submitBtn.disabled = true;
            submitBtn.innerText = '登録中...';

            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ handle, password, display_name })
                });
                const data = await res.json();

                if (!res.ok) {
                    errorMsg.innerText = data.error || '登録に失敗しました';
                    errorMsg.style.display = 'block';
                    submitBtn.disabled = false;
                    submitBtn.innerText = '登録する';
                    return;
                }

                window.location.href = '/';
            } catch (err) {
                errorMsg.innerText = '通信エラーが発生しました';
                errorMsg.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.innerText = '登録する';
            }
        });

        // 既にログイン済みならホームへ
        (async () => {
            const res = await fetch('/api/me');
            const data = await res.json();
            if (data.loggedIn) window.location.href = '/';
        })();
    </script>
</body>
</html>
